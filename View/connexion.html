<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/../Bloc3-WebSite/Assets/Style/style.css" />
    <title>Connexion</title>
  </head>
  <body id="Connexion">
    <header>
      <h1>Connexion</h1>
    </header>
    <form
      id="form-connexion"
      action="../Controller/connexion.php"
      method="post"
    >
      <div class="form-group">
        <label for="pseudo">Pseudo:</label>
        <input
          type="text"
          id="pseudo"
          class="input-field"
          name="pseudo"
          required
        />
      </div>
      <div class="form-group">
        <label for="password">Mot de passe:</label>
        <input
          type="password"
          id="password"
          class="input-field"
          name="password"
          required
        />
      </div>
      <input
        type="submit"
        id="submit-btn"
        class="input-field"
        value="Connexion"
      />
    </form>
  </body>
</html>
